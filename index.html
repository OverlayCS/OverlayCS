<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OverlayCS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --card: rgba(13,16,24,0.82);
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(0,200,255,0.35);
      --accent: #002fff;
      --text: #ffffff;
      --muted: #9fa3af;
      --mono: 'DM Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    #cur {
      position: fixed; top: 0; left: 0;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none; z-index: 9999;
      will-change: transform;
      mix-blend-mode: screen;
    }
    #cur-r {
      position: fixed; top: 0; left: 0;
      width: 26px; height: 26px;
      border: 1px solid rgba(0,200,255,0.4);
      border-radius: 50%;
      pointer-events: none; z-index: 9998;
      will-change: transform;
    }

    /* Animated background — particle canvas */
    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Subtle vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
      pointer-events: none; z-index: 1;
    }

    /* Main layout */
    .scene {
      position: relative; z-index: 2;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.2rem;
    }

    /* Top pill */
    .top-pill {
      font-family: var(--mono); font-size: 0.7rem;
      letter-spacing: 0.12em; color: var(--muted);
      background: rgba(13,16,24,0.7);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1.1rem;
      backdrop-filter: blur(12px);
      opacity: 0;
      animation: fadeDown 0.6s 0.1s ease forwards;
    }

    /* Main card */
    .card {
      width: min(580px, calc(100vw - 2rem));
      background: var(--card);
      border: 1px solid var(--border-accent);
      border-radius: 14px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.6s 0.25s ease forwards;
      box-shadow: 0 0 0 1px rgba(0,200,255,0.05), 0 32px 80px rgba(0,0,0,0.5);
    }

    .card-top {
      padding: 1.8rem 2rem 1.4rem;
      display: flex; gap: 1.4rem; align-items: flex-start;
    }

    /* Avatar placeholder — replace src with actual image */
    .avatar {
      width: 68px; height: 68px; border-radius: 50%;
      border: 2px solid var(--border-accent);
      background: #1a1f2e;
      flex-shrink: 0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 1.2rem; color: var(--muted);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .card-info { flex: 1; min-width: 0; }

    .name-row {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .name {
      font-family: var(--mono); font-size: 1.3rem;
      font-weight: 400; color: var(--text);
      letter-spacing: 0.02em;
    }
    .name-cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--accent);
      margin-left: 1px;
      animation: blink 1.1s step-end infinite;
    }
    .badges { display: flex; gap: 0.35rem; }
    .badge {
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,200,255,0.15);
      border: 1px solid rgba(0,200,255,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    .badge svg { width: 11px; height: 11px; fill: var(--accent); }

    .tagline {
      font-family: var(--mono); font-size: 0.78rem;
      color: var(--muted); font-weight: 300;
      line-height: 1.6;
    }
    .tagline span { color: var(--text); }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border) 20%, var(--border) 80%, transparent);
      margin: 0 2rem;
    }

    /* Project row */
    .project-row {
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .project-label {
      font-family: var(--mono); font-size: 0.6rem;
      color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .project-name {
      font-family: var(--mono); font-size: 0.95rem;
      color: var(--text); font-weight: 500;
    }
    .project-name span { color: var(--accent); }
    .project-desc {
      font-size: 0.76rem; color: var(--muted);
      margin-top: 0.2rem; font-weight: 300;
    }
    .project-link {
      font-family: var(--mono); font-size: 0.68rem;
      color: var(--accent); text-decoration: none;
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .project-link:hover { background: rgba(0,200,255,0.08); border-color: rgba(0,200,255,0.5); }

    /* Tech pills */
    .tech-row {
      padding: 0 2rem 1.2rem;
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .tech {
      font-family: var(--mono); font-size: 0.62rem;
      color: var(--muted); letter-spacing: 0.08em;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.18rem 0.55rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .tech:hover { border-color: rgba(0,200,255,0.3); color: var(--accent); }

    /* Social row */
    .social-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border) 20%, var(--border) 80%, transparent);
      margin: 0 2rem;
    }
    .social-row {
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .social-links { display: flex; gap: 1rem; }
    .social-link {
      color: var(--muted); text-decoration: none;
      transition: color 0.15s;
      display: flex; align-items: center;
    }
    .social-link:hover { color: var(--text); }
    .social-link svg { width: 17px; height: 17px; fill: currentColor; }

    .view-count {
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .view-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); opacity: 0.6;
    }

    /* Bottom status bar */
    .status-bar {
      font-family: var(--mono); font-size: 0.65rem;
      color: var(--muted);
      background: rgba(13,16,24,0.7);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1.1rem;
      backdrop-filter: blur(12px);
      display: flex; align-items: center; gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.4s ease forwards;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #00ff73;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>
<canvas id="bg-canvas"></canvas>

<div class="scene">

  <div class="top-pill">C# &nbsp;&bull;&nbsp; Unity &nbsp;&bull;&nbsp; Open Source</div>

  <div class="card">
    <div class="card-top">
      <div class="avatar">
        <img src="https://avatars.githubusercontent.com/u/195978978?v=4" alt="OverlayCS" />
      </div>
      <div class="card-info">
        <div class="name-row">
          <span class="name">OverlayCS<span class="name-cursor"></span></span>
          <div class="badges">
            <div class="badge">
              <svg viewBox="0 0 24 24"><path d="M9.5 3L5 8.5 9.5 14h-2L3 8.5 7.5 3h2zm5 0h2L21 8.5 16.5 14h-2L19 8.5 14.5 3z"/></svg>
            </div>
            <div class="badge">
              <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
          </div>
        </div>
        <div class="tagline">Unity/C# dev. I make multiplayer games <span>harder to crack.</span></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="project-row">
      <div class="project-info">
        <div class="project-label">featured project</div>
        <div class="project-name"><span>Net</span>box</div>
        <div class="project-desc">Server-side auth layer for Unity networking — Cloudflare + PlayFab</div>
      </div>
      <a href="https://github.com/OverlayCS/Netbox" target="_blank" class="project-link">view repo &rarr;</a>
    </div>

    <div class="tech-row">
      <span class="tech">C#</span>
      <span class="tech">Unity</span>
      <span class="tech">Cloudflare Workers</span>
      <span class="tech">PlayFab</span>
      <span class="tech">Photon</span>
      <span class="tech">Mirror</span>
      <span class="tech">FishNet</span>
    </div>

    <div class="social-divider"></div>

    <div class="social-row">
      <div class="social-links">
        <!-- GitHub -->
        <a href="https://github.com/OverlayCS" target="_blank" class="social-link" title="GitHub">
          <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        </a>
      </div>
      <div class="view-count">
        <div class="view-dot"></div>
        github.com/OverlayCS
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot"></div>
    available for projects
  </div>

</div>

<script>
  // Cursor
  var cur = document.getElementById('cur');
  var cr  = document.getElementById('cur-r');
  var mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', function(e) {
    mx = e.clientX; my = e.clientY;
    cur.style.transform = 'translate(' + (mx - 4) + 'px,' + (my - 4) + 'px)';
  }, { passive: true });

  (function rafLoop() {
    rx += (mx - rx) * 0.12;
    ry += (my - ry) * 0.12;
    cr.style.transform = 'translate(' + (rx - 13) + 'px,' + (ry - 13) + 'px)';
    requestAnimationFrame(rafLoop);
  })();

  // Animated background — floating particles + subtle grid
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var W, H, particles;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeParticle() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.2 + 0.3,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      a: Math.random() * 0.35 + 0.05
    };
  }

  function initParticles() {
    particles = [];
    var count = Math.floor((W * H) / 14000);
    for (var i = 0; i < count; i++) particles.push(makeParticle());
  }

  function drawGrid() {
    ctx.strokeStyle = 'rgba(0,200,255,0.018)';
    ctx.lineWidth = 1;
    var size = 56;
    for (var x = 0; x < W; x += size) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (var y = 0; y < H; y += size) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);

    // Deep dark bg
    ctx.fillStyle = '#0a0c10';
    ctx.fillRect(0, 0, W, H);

    drawGrid();

    // Particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,200,255,' + p.a + ')';
      ctx.fill();
    }

    // Subtle accent glow (top-right)
    var g1 = ctx.createRadialGradient(W * 0.85, H * 0.1, 0, W * 0.85, H * 0.1, W * 0.4);
    g1.addColorStop(0, 'rgba(0,200,255,0.04)');
    g1.addColorStop(1, 'transparent');
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    // Bottom-left accent
    var g2 = ctx.createRadialGradient(W * 0.1, H * 0.9, 0, W * 0.1, H * 0.9, W * 0.35);
    g2.addColorStop(0, 'rgba(100,60,255,0.04)');
    g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);

    requestAnimationFrame(tick);
  }

  resize();
  initParticles();
  tick();

  window.addEventListener('resize', function() {
    resize();
    initParticles();
  });
</script>
</body>
</html>
